<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kantin SMAN 1 Cianjur</title>
<style>
  :root {
    --bg: #09090b; --bg2: #111118; --card: #161622; --border: #27273a;
    --text: #fafafa; --text2: #a1a1aa; --accent: #8b5cf6; --accent2: #06b6d4; --success: #10b981;
    --radius: 18px; --shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Inter', system-ui; background: var(--bg); color: var(--text); line-height: 1.6;
    background-image: 
      radial-gradient(at 0% 0%, rgba(139,92,246,0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(6,182,212,0.1) 0px, transparent 50%);
    background-attachment: fixed;
  }
  body.cart-open { overflow: hidden; }
 .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(9,9,11,0.8); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; }
 .logo { font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .nav-actions { display: flex; gap: 12px; align-items: center; }
 .icon-btn { 
    position: relative; background: var(--card); border: 1px solid var(--border); 
    width: 46px; height: 46px; border-radius: 14px; cursor: pointer; 
    display: grid; place-items: center; transition:.3s cubic-bezier(.2,.8,.2,1);
    color: var(--text); 
  }
 .icon-btn svg { color: var(--text); }
 .icon-btn:hover { border-color: var(--accent); transform: translateY(-3px); }
 .cart-badge { 
    position: absolute; top: -6px; right: -6px; 
    background: linear-gradient(135deg, var(--accent), #7c3aed); 
    color: white; font-size: 11px; font-weight: 800; width: 22px; height: 22px; 
    border-radius: 50%; display: grid; place-items: center; 
    border: 2px solid var(--bg2); 
  }
 .hero { padding: 80px 0 50px; text-align: center; }
 .hero h1 { font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 900; margin-bottom: 20px; letter-spacing: -0.02em; }
 .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .hero p { color: var(--text2); max-width: 600px; margin: 0 auto 24px; font-size: 1.1rem; }
 .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
 .search { flex: 1; min-width: 260px; position: relative; }
 .search input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 14px 18px 14px 48px; border-radius: var(--radius); outline: none; transition:.3s; font-size: 15px; }
 .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
 .search svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity:.5; }
 .filter-chips { display: flex; gap: 10px; flex-wrap: wrap; }
 .chip { background: var(--card); border: 1px solid var(--border); color: var(--text2); padding: 10px 18px; border-radius: 99px; font-size: 14px; cursor: pointer; transition:.3s; font-weight: 500; }
 .chip.active,.chip:hover { background: var(--accent); border-color: var(--accent); color: white; }
 .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 80px; }
 .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition:.5s cubic-bezier(.2,.8,.2,1); animation: slideUp.6s ease backwards; }
 .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); border-color: var(--accent); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } }
 .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--bg2); }
 .card-body { padding: 20px; }
 .card-cat { font-size: 12px; color: var(--accent2); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
 .card-title { font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; }
 .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
 .card-price { font-size: 1.2rem; font-weight: 800; }
 .btn { background: linear-gradient(135deg, var(--accent), #7c3aed); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition:.3s; font-size: 14px; }
 .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
 .btn:disabled { opacity:.4; cursor: not-allowed; transform: none; }
 .btn-sm { padding: 10px 16px; }
 .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition:.4s; z-index: 200; }
 .cart-overlay.show { opacity: 1; pointer-events: all; }
 .cart { 
    position: fixed; top: 0; right: 0; width: 100%; max-width: 420px; height: 100vh; 
    background: var(--bg2); border-left: 1px solid var(--border); z-index: 201; 
    display: flex; flex-direction: column; 
    transform: translateX(100%); 
    transition:.5s cubic-bezier(.2,.8,.2,1); 
  }
 .cart.show { transform: translateX(0); }
 .cart-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
 .cart-items { flex: 1; overflow-y: auto; padding: 24px; }
 .cart-item { display: flex; gap: 14px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
 .cart-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
 .cart-item-info { flex: 1; }
 .cart-item-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
 .cart-item-price { font-size: 14px; color: var(--accent2); margin-bottom: 8px; }
 .qty { display: flex; align-items: center; gap: 10px; }
 .qty button { width: 28px; height: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-weight: 700; }
 .cart-footer { padding: 24px; border-top: 1px solid var(--border); }
 .total { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 800; font-size: 1.2rem; }
 .checkout-form input,.checkout-form textarea { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 14px; margin-bottom: 14px; outline: none; font-size: 15px; }
 .checkout-form input:focus,.checkout-form textarea:focus { border-color: var(--accent); }
 .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); border: 1px solid var(--border); padding: 14px 24px; border-radius: 14px; box-shadow: var(--shadow); z-index: 300; opacity: 0; transition:.5s; }
 .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 .empty { text-align: center; padding: 80px 20px; color: var(--text2); grid-column: 1 / -1; }
 .admin-link { 
  font-size: 14px; 
  color: var(--text); 
  text-decoration: none; 
  font-weight: 600;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 12px 18px;
  border-radius: 14px;
  transition: .3s cubic-bezier(.2,.8,.2,1);
  display: inline-flex;
  align-items: center;
  height: 46px;
}
.admin-link:hover { 
  border-color: var(--accent); 
  transform: translateY(-3px);
  color: var(--text);
}
 .admin-link:hover { color: var(--accent); }
 .loader { text-align: center; padding: 80px; grid-column: 1 / -1; color: var(--text2); }
 .stok { font-size: 12px; color: var(--success); font-weight: 600; }
  @media (max-width: 768px) {.cart { max-width: 100%; }.controls { flex-direction: column; } .products { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } }
</style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">Kantin Mas Gian</div>
        <div class="nav-actions">
          <a href="/admin.html" class="admin-link">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
  Admin Mas Gian
</a>
          <button class="icon-btn" id="cartBtn">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-badge" id="cartCount">0</span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Kantin <span>Digital</span> Mas Gian</h1>
      <p>Pesan makanan & minuman favoritmu langsung dari kelas. Bayar di tempat, anti antri.</p>
    </section>

    <section class="controls">
      <div class="search">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        <input type="text" id="searchInput" placeholder="Cari menu...">
      </div>
      <div class="filter-chips" id="filterChips"></div>
    </section>

    <section class="products" id="productsGrid">
      <div class="loader">Memuat menu...</div>
    </section>
  </main>

  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart" id="cartDrawer">
    <div class="cart-header">
      <h3>Keranjang Kamu</h3>
      <button class="icon-btn" id="closeCart">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="total"><span>Total</span><span id="cartTotal">Rp0</span></div>
      <form class="checkout-form" id="checkoutForm">
        <input type="text" id="custName" placeholder="Nama Lengkap" required>
        <input type="text" id="custKelas" placeholder="Kelas, ex: XII IPA 1" required>
        <textarea id="custCatatan" placeholder="Catatan, ex: tanpa sambal, pedas" rows="2"></textarea>
        <button type="submit" class="btn" id="orderBtn">Pesan Sekarang</button>
      </form>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAa9Sdc7H8XGARunqQSVzVTwsBCddMeak",
    authDomain: "smanegeri1cianjur.firebaseapp.com",
    databaseURL: "https://smanegeri1cianjur-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "smanegeri1cianjur",
    storageBucket: "smanegeri1cianjur.firebasestorage.app",
    messagingSenderId: "658794565592",
    appId: "1:658794565592:web:50a93bca6b1a61d42eacad",
    measurementId: "G-XHYELX78QJ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let PRODUCTS = [];
  let cart = [];
  let activeFilter = "All";

  const $ = sel => document.querySelector(sel);
  const rupiah = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
  const showToast = msg => {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  onValue(ref(db, 'products'), (snapshot) => {
    const data = snapshot.val();
    PRODUCTS = data? Object.keys(data).map(key => ({ id: key,...data[key] })) : [];
    renderCategories(); renderProducts();
  });

  function renderProducts() {
    const q = $('#searchInput').value.toLowerCase();
    const filtered = PRODUCTS.filter(p =>
      (activeFilter === "All" || p.cat === activeFilter) &&
      p.name.toLowerCase().includes(q) && p.stok > 0
    );
    const grid = $('#productsGrid');
    if (!PRODUCTS.length) return grid.innerHTML = `<div class="empty">Menu belum tersedia</div>`;
    if (!filtered.length) return grid.innerHTML = `<div class="empty">Menu tidak ditemukan :(</div>`;
    grid.innerHTML = filtered.map((p, i) => `
      <div class="card" style="animation-delay: ${i * 0.05}s">
        <img src="${p.img}" alt="${p.name}" class="card-img" loading="lazy">
        <div class="card-body">
          <div class="card-cat">${p.cat}</div>
          <div class="card-title">${p.name}</div>
          <div class="stok">Stok: ${p.stok}</div>
          <div class="card-footer">
            <div class="card-price">${rupiah(p.price)}</div>
            <button class="btn btn-sm" onclick="addToCart('${p.id}')" ${p.stok <= 0? 'disabled' : ''}>
              ${p.stok <= 0? 'Habis' : '+ Pesan'}
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderCategories() {
    const cats = ["All",...new Set(PRODUCTS.map(p => p.cat))];
    $('#filterChips').innerHTML = cats.map(c =>
      `<button class="chip ${c === activeFilter? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
    ).join('');
  }

  window.setFilter = (cat) => { activeFilter = cat; renderCategories(); renderProducts(); }

  window.addToCart = (id) => {
    const p = PRODUCTS.find(p => p.id === id);
    if (!p || p.stok <= 0) return showToast("Stok habis");
    const item = cart.find(i => i.id === id);
    if (item) {
      if (item.qty >= p.stok) return showToast("Stok tidak cukup");
      item.qty++;
    } else cart.push({...p, qty: 1 });
    updateCart(); showToast("Ditambahkan ke keranjang");
  }

  window.updateQty = (id, delta) => {
    const item = cart.find(i => i.id === id); if (!item) return;
    const p = PRODUCTS.find(p => p.id === id);
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(i => i.id!== id);
    if (item.qty > p.stok) { item.qty = p.stok; showToast("Stok maksimal"); }
    updateCart();
  }

  function updateCart() {
    $('#cartCount').textContent = cart.reduce((a, i) => a + i.qty, 0);
    if (!cart.length) {
      $('#cartItems').innerHTML = `<div class="empty">Keranjang kosong</div>`;
      $('#cartTotal').textContent = rupiah(0); return;
    }
    $('#cartItems').innerHTML = cart.map(i => `
      <div class="cart-item">
        <img src="${i.img}" alt="${i.name}">
        <div class="cart-item-info">
          <div class="cart-item-title">${i.name}</div>
          <div class="cart-item-price">${rupiah(i.price)}</div>
          <div class="qty">
            <button onclick="updateQty('${i.id}', -1)">-</button>
            <span>${i.qty}</span>
            <button onclick="updateQty('${i.id}', 1)">+</button>
          </div>
        </div>
      </div>
    `).join('');
    $('#cartTotal').textContent = rupiah(cart.reduce((a, i) => a + i.price * i.qty, 0));
  }

  $('#checkoutForm').onsubmit = async (e) => {
    e.preventDefault();
    if (!cart.length) return showToast("Keranjang masih kosong");
    const name = $('#custName').value.trim(), kelas = $('#custKelas').value.trim(), catatan = $('#custCatatan').value.trim();
    if (!name ||!kelas) return showToast("Lengkapi nama & kelas dulu");
    
    $('#orderBtn').disabled = true;
    $('#orderBtn').textContent = 'Mengirim...';

    try {
      const orderData = {
        nama: name,
        kelas: kelas,
        catatan: catatan,
        items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
        total: cart.reduce((a, i) => a + i.price * i.qty, 0),
        status: 'baru',
        waktu: serverTimestamp()
      };
      await push(ref(db, 'orders'), orderData);
      cart = []; updateCart(); $('#checkoutForm').reset();
      $('#cartDrawer').classList.remove('show'); $('#cartOverlay').classList.remove('show');
      document.body.classList.remove('cart-open');
      showToast("Pesanan berhasil dikirim! Tunggu di kelas ya");
    } catch (err) {
      showToast("Gagal kirim pesanan: " + err.message);
    } finally {
      $('#orderBtn').disabled = false;
      $('#orderBtn').textContent = 'Pesan Sekarang';
    }
  };

  $('#cartBtn').onclick = () => { 
    $('#cartDrawer').classList.add('show'); 
    $('#cartOverlay').classList.add('show');
    document.body.classList.add('cart-open');
  };
  $('#closeCart').onclick = $('#cartOverlay').onclick = () => { 
    $('#cartDrawer').classList.remove('show'); 
    $('#cartOverlay').classList.remove('show');
    document.body.classList.remove('cart-open');
  };
  $('#searchInput').oninput = renderProducts;
</script>
</body>
</html>
